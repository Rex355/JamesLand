<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ James Land · AI · Chat · Games · Gambling · Maps · Users</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg: #04040d;
            --surface: rgba(10, 10, 30, 0.7);
            --surface2: rgba(20, 20, 50, 0.6);
            --neon: #ff00e5;
            --neon2: #00f0ff;
            --gold: #ffd700;
            --danger: #ff3860;
            --text: #f0f0ff;
            --text2: #a0a0d0;
            --radius: 24px;
            --radius-sm: 14px;
            --glass-border: rgba(255, 255, 255, 0.08);
            --glow-neon: 0 0 30px rgba(255, 0, 229, 0.7);
            --glow-neon2: 0 0 30px rgba(0, 240, 255, 0.7);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .sidebar {
            width: 280px;
            background: rgba(5, 5, 20, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 35px 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 8px 0 40px rgba(0, 0, 0, 0.6);
            z-index: 10;
            position: sticky;
            top: 0;
            height: 100vh;
        }
        .sidebar h2 {
            font-size: 2rem;
            text-align: center;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--neon), var(--neon2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            font-weight: 900;
            filter: drop-shadow(0 0 25px var(--neon));
            animation: titlePulse 2s infinite alternate;
        }
        @keyframes titlePulse {
            from { filter: drop-shadow(0 0 20px var(--neon)); }
            to { filter: drop-shadow(0 0 40px var(--neon2)); }
        }
        .nav-btn {
            background: var(--surface);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 15px 22px;
            border-radius: 18px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }
        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.06), transparent);
            transition: 0.5s;
        }
        .nav-btn:hover::before { left: 100%; }
        .nav-btn:hover, .nav-btn.active {
            background: rgba(255, 0, 229, 0.1);
            border-color: var(--neon);
            box-shadow: 0 0 35px rgba(255, 0, 229, 0.5), inset 0 0 15px rgba(255, 0, 229, 0.1);
            color: #fff;
            transform: translateX(8px);
        }
        .nav-btn .icon {
            font-size: 1.5rem;
            width: 32px;
            text-align: center;
            filter: drop-shadow(0 0 8px currentColor);
        }
        .main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            height: 100vh;
            position: relative;
            z-index: 1;
        }
        .section { display: none; animation: fadeSlide 0.5s ease; }
        .section.active { display: block; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }

        .card {
            background: rgba(10, 10, 30, 0.65);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border-radius: var(--radius);
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 0 30px rgba(255, 255, 255, 0.03);
            transition: all 0.4s ease;
            animation: cardGlow 3s infinite alternate;
        }
        @keyframes cardGlow {
            from { box-shadow: 0 0 20px rgba(255,0,229,0.2); }
            to { box-shadow: 0 0 40px rgba(0,240,255,0.2); }
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 50px rgba(0,0,0,0.7), 0 0 60px rgba(255,0,229,0.3);
            border-color: rgba(255,0,229,0.3);
        }
        h3 {
            font-size: 2.2rem;
            margin-bottom: 25px;
            background: linear-gradient(135deg, var(--neon2), var(--neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            font-weight: 700;
            display: inline-block;
            filter: drop-shadow(0 0 15px var(--neon2));
        }
        button {
            background: linear-gradient(135deg, var(--neon), #c700b0);
            border: none;
            color: #fff;
            font-weight: 700;
            padding: 14px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 0.95rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 30px rgba(255, 0, 229, 0.7);
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 50px rgba(255, 0, 229, 1);
        }
        button:active { transform: translateY(0); }
        input, select, textarea {
            background: rgba(20, 20, 40, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 16px 22px;
            border-radius: 50px;
            font-size: 1rem;
            outline: none;
            width: 100%;
            margin: 8px 0;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
        }
        textarea {
            border-radius: 25px;
            min-height: 80px;
            resize: vertical;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--neon2);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.5), inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .flex-row { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; }
        .chat-box {
            height: 320px;
            overflow-y: auto;
            background: rgba(5, 5, 20, 0.7);
            backdrop-filter: blur(15px);
            border-radius: var(--radius-sm);
            padding: 25px;
            margin: 20px 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: inset 0 0 30px rgba(0,0,0,0.6);
        }
        .msg { margin: 12px 0; display: flex; gap: 10px; }
        .msg.user { justify-content: flex-end; }
        .msg span {
            max-width: 75%;
            padding: 12px 22px;
            border-radius: 30px;
            background: rgba(30, 30, 60, 0.8);
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .msg.user span {
            background: linear-gradient(135deg, var(--neon), #d400b0);
            color: #fff;
            box-shadow: 0 0 25px rgba(255, 0, 229, 0.6);
        }
        .msg.ai span {
            background: linear-gradient(135deg, #00ccdd, var(--neon2));
            color: #000;
        }
        .human-msg {
            margin: 10px 0;
            padding: 10px 18px;
            background: rgba(25, 25, 50, 0.8);
            backdrop-filter: blur(5px);
            border-radius: 18px;
            border-left: 4px solid var(--neon2);
            animation: slideIn 0.3s ease;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } }
        .role-badge {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 700;
            margin-right: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .role-Owner { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
        .role-Admin { background: linear-gradient(135deg, #ff3860, #ff0060); color: white; }
        .role-Mod { background: linear-gradient(135deg, #00d1b2, #00b89c); color: #000; }
        .role-User { background: linear-gradient(135deg, #485fc7, #3b4bbf); color: white; }
        .role-Guest { background: #555; color: #ddd; }
        .banned-tag { background: #ff3860; color: white; font-size: 0.7rem; padding: 3px 12px; border-radius: 20px; margin-left: 6px; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: rgba(0,0,0,0.2); border-radius: var(--radius-sm); overflow: hidden; }
        th { background: rgba(255,0,229,0.1); padding: 15px; text-align: left; font-weight: 600; color: var(--neon); }
        td { padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .small-btn { padding: 6px 16px; font-size: 0.75rem; margin: 0 4px; border-radius: 30px; letter-spacing: 0.5px; }

        #map { height: 400px; border-radius: var(--radius-sm); margin: 20px 0; border: 2px solid rgba(0, 240, 255, 0.3); box-shadow: 0 0 40px rgba(0, 240, 255, 0.3); }
        .slot-machine { display: flex; gap: 25px; justify-content: center; font-size: 4.5rem; margin: 35px 0; }
        .reel {
            background: rgba(15, 15, 30, 0.9);
            backdrop-filter: blur(10px);
            padding: 25px 35px;
            border-radius: 25px;
            border: 2px solid var(--gold);
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.7), inset 0 0 25px rgba(255, 204, 0, 0.3);
            min-width: 100px;
            text-align: center;
            transition: 0.2s;
        }
        .balance { font-size: 2.2rem; color: var(--gold); text-shadow: 0 0 25px var(--gold); font-weight: 700; }

        .game-toggle { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .game-toggle button {
            background: rgba(255,255,255,0.05);
            box-shadow: none;
            font-size: 0.85rem;
            padding: 10px 20px;
        }
        .game-toggle button.active-game {
            background: var(--neon);
            box-shadow: 0 0 25px var(--neon);
        }

        .game-frame { width: 100%; height: 70vh; border: none; border-radius: var(--radius-sm); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; box-shadow: 0 0 10px var(--neon); }
    </style>
</head>
<body>
    <canvas id="particleCanvas"></canvas>

    <div class="sidebar">
        <h2>⚡J
